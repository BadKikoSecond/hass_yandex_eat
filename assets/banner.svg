      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="45%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fc3f1d"/>
